name: Deploy to PhysiQ hub

on:
  push:
    branches: [main]

concurrency:
  group: physiq-hub-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout physiq-assessment
        uses: actions/checkout@v4

      - name: Checkout physiq hub
        uses: actions/checkout@v4
        with:
          repository: physiodevapp/physiq
          token: ${{ secrets.PHYSIQ_DEPLOY_TOKEN }}
          path: physiq-hub

      - name: Copy files to hub
        run: |
          rm -rf physiq-hub/assessment
          mkdir -p physiq-hub/assessment/lib physiq-hub/assessment/icons
          cp index.html styles.css app.js phase4.js phase4b.js data.js sw.js manifest.json favicon.svg .nojekyll physiq-hub/assessment/
          cp icons/icon-192.png icons/icon-512.png physiq-hub/assessment/icons/
          cp lib/session.js physiq-hub/assessment/lib/

      - name: Commit and push
        working-directory: physiq-hub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assessment/
          git diff --cached --quiet || git commit -m "chore: update assessment from physiq-assessment@${{ github.sha }}"
          for i in 1 2 4 8; do
            git push && break
            echo "Push rejected, retrying in ${i}s..."
            sleep $i
            git pull --rebase origin main
          done
