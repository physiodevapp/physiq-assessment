name: Deploy to PhysiQ hub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout physiq-assessment
        uses: actions/checkout@v4

      - name: Checkout physiq hub
        uses: actions/checkout@v4
        with:
          repository: physiodevapp/physiq
          token: ${{ secrets.PHYSIQ_DEPLOY_TOKEN }}
          path: physiq-hub

      - name: Copy files to hub
        run: |
          mkdir -p physiq-hub/assessment/lib
          cp index.html app.js data.js sw.js manifest.json favicon.svg apple-touch-icon.png .nojekyll physiq-hub/assessment/
          cp lib/session.js physiq-hub/assessment/lib/

      - name: Commit and push
        working-directory: physiq-hub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assessment/
          git diff --cached --quiet || git commit -m "chore: update assessment from physiq-assessment@${{ github.sha }}"
          git push
